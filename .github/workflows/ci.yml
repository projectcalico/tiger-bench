name: ci
#  This file requires QUAY_USERNAME, REGISTRY, ORGANISATION variables and a QUAY_TOKEN secret

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  GO_VERSION: 1.24.3
  REGISTRY: quay.io
  ORGANISATION: tigeradev

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install dependencies
        run: go mod download
      - name: Build
        run: go build -v ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84  # v6
        with:
          version: v1.64.8
      - name: Test
        run: go test -v ./...
      - name: Run FOSSA scan
        if: github.event_name == 'push' && github.repository == 'projectcalico/tiger-bench'
        uses: fossas/fossa-action@c414b9ad82eaad041e47a7cf62a4f02411f427a0  # v1.8.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
      - name: Run e2e test
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        run: make e2e-test
  deploy:
    needs: test
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./images/perf/Dockerfile
            image: ${{ vars.REGISTRY }}/${{ vars.ORGANISATION }}/tiger-bench-perf
          - dockerfile: ./images/nginx/Dockerfile
            image: ${{ vars.REGISTRY }}/${{ vars.ORGANISATION }}/tiger-bench-nginx
          - dockerfile: ./images/ttfr/Dockerfile
            image: ${{ vars.REGISTRY }}/${{ vars.ORGANISATION }}/tiger-bench-ttfr
          - dockerfile: ./Dockerfile
            image: ${{ vars.REGISTRY }}/${{ vars.ORGANISATION }}/tiger-bench
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Login to Docker registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ vars.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3
        with:
          platforms: linux/arm64,linux/amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build and push Docker images for tiger-bench
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
